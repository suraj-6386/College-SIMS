<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPU SIMS</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .landing-container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }
        .dpu-logo {
            max-width: 350px;
            margin-bottom: 2rem;
            clip-path: circle(48% at 50% 50%);
            border-radius: 50%;
        }
        .school-title {
            background-color: var(--color-primary);
            color: var(--color-surface);
            padding: 1rem 2rem;
            display: inline-block;
            font-family: var(--font-body);
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 1.25rem;
            margin-bottom: 3rem;
            border-radius: var(--button-radius);
        }
        .portal-title {
            font-size: 2rem;
            color: var(--color-text);
            margin-bottom: 0.5rem;
        }
        .portal-subtitle {
            color: #4a4a4a;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }
        .action-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-surface) !important;
            padding: 0.8rem 2rem;
            font-size: 1.05rem;
            border-radius: var(--button-radius);
        }
        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.2);
            transform: translateY(-2px);
        }
        .btn-outline {
            background-color: transparent;
            color: var(--color-primary) !important;
            border: 2px solid var(--color-primary);
            padding: 0.8rem 2rem;
            font-size: 1.05rem;
            border-radius: var(--button-radius);
        }
        .btn-outline:hover {
            background-color: rgba(139, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        .landing-footer {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: #4a4a4a;
        }
    </style>
</head>
<body>
    <div class="landing-container">
        

        <img src="images/image.png" alt="Dr. D.Y. Patil Vidyapeeth, Pune" class="dpu-logo">
        
      
        <div class="school-title">SCHOOL OF SCIENCE AND TECHNOLOGY</div>
        
        <h1 class="portal-title">Student Information Management System</h1>
        <p class="portal-subtitle">A tool to manage academic records for students.</p>
        
        <div class="action-buttons">
            <a href="pages/login.jsp" class="btn btn-primary">Sign In to Portal</a>
            <a href="pages/registration.jsp" class="btn btn-outline">New Registration</a>
        </div>
        
        <div class="landing-footer">
            <p>&copy; 2026 SIMS - Student Information Management System. </p>
            <p>&copy; SURAJ GUPTA | MCA</p>
        </div>
    </div>
</body>
</html>
